{% extends "base.html" %}
{% block title %}Company Detail — Research Portfolio{% endblock %}

{% block content %}
<div id="company-page" data-ticker="{{ ticker }}" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

  <!-- Loading -->
  <div id="loading" class="flex items-center justify-center py-24 text-gray-400 text-lg">Loading…</div>

  <!-- Error -->
  <div id="error" class="hidden text-center py-24">
    <p class="text-red-600 text-lg font-medium" id="error-msg"></p>
    <a href="/" class="text-blue-600 hover:underline mt-2 inline-block">← Back to dashboard</a>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="main-content" class="hidden">

    <!-- Persistent Header -->
    <div id="header-section"></div>

    <!-- Risk/Reward Bar -->
    <div id="risk-reward-bar" class="mt-4 mb-6"></div>

    <!-- Tab Navigation -->
    <div class="border-b border-gray-200 mb-6">
      <nav class="flex space-x-1 overflow-x-auto" id="tab-nav">
        <button class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 whitespace-nowrap" data-tab="overview">Overview</button>
        <button class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 whitespace-nowrap" data-tab="scenarios">Scenarios &amp; Indicators</button>
        <button class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 whitespace-nowrap" data-tab="model">Model</button>
        <button class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 whitespace-nowrap" data-tab="history">History</button>
      </nav>
    </div>

    <!-- Tab Content Panels -->
    <div id="tab-overview" class="tab-panel"></div>
    <div id="tab-scenarios" class="tab-panel hidden"></div>
    <div id="tab-model" class="tab-panel hidden"></div>
    <div id="tab-history" class="tab-panel hidden"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/company.js"></script>
{% endblock %}
