<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Detail</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6fa; color: #2c3e50; }
        .header { background: #fff; border-bottom: 1px solid #e1e4e8; padding: 16px 24px; }
        .header a { color: #6b7280; text-decoration: none; font-size: 13px; }
        .header a:hover { color: #2563eb; }
        .company-banner { background: #fff; border-bottom: 1px solid #e1e4e8; padding: 20px 24px; }
        .company-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .company-subtitle { font-size: 14px; color: #6b7280; margin-bottom: 12px; }
        .company-stats { display: flex; gap: 32px; flex-wrap: wrap; }
        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #9ca3af; font-weight: 600; }
        .stat-value { font-size: 18px; font-weight: 600; }
        .upside-pos { color: #16a34a; }
        .upside-neg { color: #dc2626; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .tabs { display: flex; border-bottom: 2px solid #e1e4e8; background: #fff; padding: 0 24px; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab:hover { color: #2c3e50; }
        .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
        .tab-content { display: none; padding: 24px 0; }
        .tab-content.active { display: block; }
        .card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; margin-bottom: 16px; }
        .card-header { padding: 14px 20px; border-bottom: 1px solid #e1e4e8; font-weight: 600; font-size: 15px; }
        .card-body { padding: 16px 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: #6b7280; border-bottom: 1px solid #e1e4e8; }
        td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-green { background: #f0fdf4; color: #16a34a; }
        .badge-yellow { background: #fefce8; color: #a16207; }
        .badge-red { background: #fef2f2; color: #dc2626; }
        .badge-above { background: #eff6ff; color: #2563eb; }
        .badge-below { background: #fef2f2; color: #dc2626; }
        .badge-neutral { background: #f3f4f6; color: #6b7280; }
        .pitch { font-size: 14px; line-height: 1.6; color: #374151; }
        .empty { padding: 24px; text-align: center; color: #9ca3af; font-size: 14px; }
        .catalyst-occurred { text-decoration: line-through; color: #9ca3af; }
        .history-item { padding: 12px 20px; border-bottom: 1px solid #f3f4f6; }
        .history-item:last-child { border-bottom: none; }
        .history-meta { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
        .history-summary { font-size: 14px; }
        .return-pos { color: #16a34a; font-weight: 600; }
        .return-neg { color: #dc2626; font-weight: 600; }
        .drop-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(37,99,235,0.08); z-index: 200; justify-content: center; align-items: center; }
        .drop-overlay.active { display: flex; }
        .drop-overlay-inner { padding: 48px 64px; border: 3px dashed #2563eb; border-radius: 16px; background: rgba(255,255,255,0.95); text-align: center; }
        .drop-overlay-inner p { font-size: 18px; font-weight: 600; color: #2563eb; }
        .delete-link { color: #ef4444; font-size: 13px; cursor: pointer; text-decoration: none; }
        .delete-link:hover { text-decoration: underline; }
        .badge-event { background: #f3f4f6; color: #6b7280; font-size: 11px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
        .indicator-event { color: #9ca3af; }
        .catalyst-past td { color: #6b7280; }
        .catalyst-check { color: #22c55e; margin-right: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">&larr; Back to Portfolio</a>
    </div>
    <div class="company-banner">
        <div class="container">
            <div class="company-title" id="companyName">Loading...</div>
            <div class="company-subtitle" id="companySubtitle"></div>
            <div class="company-stats" id="companyStats"></div>
        </div>
    </div>
    <div class="tabs" id="tabsBar">
        <div class="tab active" data-tab="overview">Overview</div>
        <div class="tab" data-tab="scenarios">Scenarios &amp; Indicators</div>
        <div class="tab" data-tab="model">Model</div>
        <div class="tab" data-tab="history">History</div>
    </div>
    <div class="container">
        <div class="tab-content active" id="tab-overview"></div>
        <div class="tab-content" id="tab-scenarios"></div>
        <div class="tab-content" id="tab-model"></div>
        <div class="tab-content" id="tab-history"></div>
    </div>

    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay-inner">
            <p>Drop JSON file to import</p>
        </div>
    </div>

    <script>
        const TICKER = "{{ ticker }}";
    </script>
    <script src="/static/company.js"></script>
</body>
</html>
