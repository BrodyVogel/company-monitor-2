<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Research Portfolio{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Nav Bar -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-14 items-center">
        <a href="/" class="text-lg font-semibold text-gray-900">Research Portfolio</a>
        <button id="import-btn" onclick="document.getElementById('import-modal').classList.remove('hidden')"
                class="inline-flex items-center px-3 py-1.5 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
          Import
        </button>
      </div>
    </div>
  </nav>

  <!-- Import Modal -->
  <div id="import-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-lg">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Import Company Data</h3>
        <button onclick="document.getElementById('import-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <textarea id="import-json" rows="12" class="w-full border border-gray-300 rounded-md p-3 text-sm font-mono" placeholder="Paste JSON here..."></textarea>
      <div id="import-result" class="mt-2 text-sm hidden"></div>
      <div class="mt-4 flex justify-end space-x-3">
        <button onclick="document.getElementById('import-modal').classList.add('hidden')" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</button>
        <button onclick="submitImport()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700">Import</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-lg text-sm text-white z-50"></div>

  <script>
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-lg text-sm text-white z-50 ' +
        (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3500);
    }

    async function submitImport() {
      const el = document.getElementById('import-json');
      const resultEl = document.getElementById('import-result');
      try {
        const data = JSON.parse(el.value);
        const resp = await fetch('/api/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await resp.json();
        if (resp.ok) {
          resultEl.textContent = result.message || 'Import successful';
          resultEl.className = 'mt-2 text-sm text-green-700';
          showToast('Import successful');
          setTimeout(() => { document.getElementById('import-modal').classList.add('hidden'); location.reload(); }, 1200);
        } else {
          resultEl.textContent = result.error || 'Import failed';
          resultEl.className = 'mt-2 text-sm text-red-600';
        }
      } catch (e) {
        resultEl.textContent = 'Invalid JSON: ' + e.message;
        resultEl.className = 'mt-2 text-sm text-red-600';
      }
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
