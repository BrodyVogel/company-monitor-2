<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6fa; color: #2c3e50; }
        .header { background: #fff; border-bottom: 1px solid #e1e4e8; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
        .section { background: #fff; border-radius: 8px; border: 1px solid #e1e4e8; margin-bottom: 24px; }
        .section-header { padding: 16px 20px; border-bottom: 1px solid #e1e4e8; font-size: 16px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: #6b7280; border-bottom: 1px solid #e1e4e8; }
        td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9fafb; }
        .ticker-link { color: #2563eb; text-decoration: none; font-weight: 500; }
        .ticker-link:hover { text-decoration: underline; }
        .signal { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
        .signal-green { background: #22c55e; }
        .signal-yellow { background: #eab308; }
        .signal-red { background: #ef4444; }
        .upside-pos { color: #16a34a; }
        .upside-neg { color: #dc2626; }
        .change-item { padding: 12px 20px; border-bottom: 1px solid #f3f4f6; }
        .change-item:last-child { border-bottom: none; }
        .change-meta { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
        .change-summary { font-size: 14px; }
        .empty { padding: 24px; text-align: center; color: #9ca3af; font-size: 14px; }
        .import-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .import-modal.active { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; }
        .modal-content h2 { margin-bottom: 16px; font-size: 18px; }
        .modal-content textarea { width: 100%; height: 200px; border: 1px solid #d1d5db; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .import-status { margin-top: 12px; font-size: 14px; padding: 8px 12px; border-radius: 6px; display: none; }
        .import-status.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .import-status.error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .drop-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(37,99,235,0.08); z-index: 200; justify-content: center; align-items: center; }
        .drop-overlay.active { display: flex; }
        .drop-overlay-inner { padding: 48px 64px; border: 3px dashed #2563eb; border-radius: 16px; background: rgba(255,255,255,0.95); text-align: center; }
        .drop-overlay-inner p { font-size: 18px; font-weight: 600; color: #2563eb; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Research Portfolio</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openImport()">Import JSON</button>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-header">Portfolio</div>
            <div id="portfolio-table"></div>
        </div>

        <div class="section">
            <div class="section-header">What's Changed</div>
            <div id="changes-feed"></div>
        </div>
    </div>

    <div class="import-modal" id="importModal">
        <div class="modal-content">
            <h2>Import JSON</h2>
            <textarea id="importJson" placeholder="Paste JSON here..."></textarea>
            <div class="import-status" id="importStatus"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeImport()">Cancel</button>
                <button class="btn btn-primary" onclick="submitImport()">Import</button>
            </div>
        </div>
    </div>

    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay-inner">
            <p>Drop JSON file to import</p>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
